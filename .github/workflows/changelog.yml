name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changelog coverage
        env:
          CHANGELOG_BASE_REF: origin/${{ github.base_ref || github.event.repository.default_branch }}
        run: node scripts/check-changelog-updated.mjs
