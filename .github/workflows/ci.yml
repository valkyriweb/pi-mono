name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fork-safety-check:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_OAUTH_TOKEN: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""
      CEREBRAS_API_KEY: ""
      XAI_API_KEY: ""
      OPENROUTER_API_KEY: ""
      ZAI_API_KEY: ""
      MISTRAL_API_KEY: ""
      MINIMAX_API_KEY: ""
      MINIMAX_CN_API_KEY: ""
      KIMI_API_KEY: ""
      AI_GATEWAY_API_KEY: ""
      OPENCODE_API_KEY: ""
      COPILOT_GITHUB_TOKEN: ""
      HF_TOKEN: ""
      GOOGLE_APPLICATION_CREDENTIALS: ""
      GOOGLE_CLOUD_PROJECT: ""
      GCLOUD_PROJECT: ""
      GOOGLE_CLOUD_LOCATION: ""
      AWS_PROFILE: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_SESSION_TOKEN: ""
      AWS_REGION: ""
      AWS_DEFAULT_REGION: ""
      AWS_BEARER_TOKEN_BEDROCK: ""
      AWS_CONTAINER_CREDENTIALS_RELATIVE_URI: ""
      AWS_CONTAINER_CREDENTIALS_FULL_URI: ""
      AWS_WEB_IDENTITY_TOKEN_FILE: ""
      AZURE_OPENAI_API_KEY: ""
      AZURE_OPENAI_BASE_URL: ""
      AZURE_OPENAI_RESOURCE_NAME: ""
      PI_NO_LOCAL_LLM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s "$(which fdfind)" /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build workspace declarations
        run: npm run build

      - name: Fork canonical check
        run: npm run check

      - name: Source CLI smoke
        run: ./pi-test.sh --no-env --version
